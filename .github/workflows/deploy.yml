name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f # v2

      - name: Restore NuGet packages
        run: nuget restore AppTaller.sln

      - name: Update version
        shell: pwsh
        run: |
          $version = "1.0.$env:GITHUB_RUN_NUMBER"
          $path = "Properties\AssemblyInfo.cs"
          $content = Get-Content $path -Raw
          $content = $content -replace 'AssemblyVersion\(".*?"\)', "AssemblyVersion(""$version"")"
          $content = $content -replace 'AssemblyFileVersion\(".*?"\)', "AssemblyFileVersion(""$version"")"
          Set-Content $path $content
          Write-Host "Version set to $version"

      - name: Build
        run: msbuild AppTaller.csproj /p:Configuration=Release /p:Platform=AnyCPU

      - name: Create publish folder
        run: |
          mkdir publish
          xcopy /E /I bin\Release publish\

      - name: Set version output
        id: version
        shell: pwsh
        run: echo "version=1.0.$env:GITHUB_RUN_NUMBER" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath AppTaller-${{ steps.version.outputs.version }}.zip

      - name: Generate release notes
        shell: pwsh
        run: |
          $notes = @"
          ## AppTaller v${{ steps.version.outputs.version }}
          **Fecha:** $(Get-Date -Format 'yyyy-MM-dd HH:mm')
          **Commit:** $env:GITHUB_SHA
          **Build:** $env:GITHUB_RUN_NUMBER
          "@
          Set-Content RELEASE_NOTES.md $notes

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: AppTaller v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            AppTaller-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
